name: Facility
version: '0.4.18'
main: fi.alavesa.facility.FacilityPlugin
api-version: '1.21'
description: Main menu / lobby / teams / combat-log system for the SITE-19 SCP prison RP server.
# Terminal is a SOFT dep only: we defer to its CCTV spectator sessions via a
# PDC check, but never require it to be present.
softdepend: [LuckPerms, Labra, Terminal]
commands:
  facility:
    description: Lobby menu, team selection, and admin team management
    usage: /facility <continue|teams|team|grant|revoke|reload>
    aliases: [fac]
  menu:
    description: Return to the SITE-19 main menu
    usage: /menu
permissions:
  facility.use:
    description: Use the lobby menu, continue into the world, and pick a public team
    default: true
  facility.admin:
    description: Add/remove teams, grant/revoke private-team access, reload config
    default: op
  facility.bypass:
    description: Skip the lobby menu on join (for building admins). NOT default - grant it explicitly.
    default: false
