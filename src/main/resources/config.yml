# Facility - SITE-19 lobby / teams / combat-log config.
#
# The lobby vantage new arrivals are frozen at while the main menu is open.
# If unset, we freeze them wherever they logged in / world spawn. Set with a
# world name to pin the menu camera somewhere scenic (a window over the site).
lobby:
  world: ""        # blank = use the player's current world / its spawn
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Combat-log tag length, in seconds. Re-taking damage refreshes it. Logging
# out while tagged is treated as a death (see COMBAT_LOG_SECONDS in code).
combat:
  seconds: 15

# The MAIN menu dialog, operator-editable at runtime.
#   reentry-seconds - how long a player must STAND STILL (no block move, no
#                     damage) after /menu before the menu reopens. The initial
#                     join-lock still opens the menu immediately; only manual
#                     re-entry uses this hold. Default 10.
#   elements        - the ordered contents of the main dialog. Each element is
#                     one of:
#                       {type: button, label: "<&-coloured>", action: "<command>"}
#                       {type: text,   label: "<&-coloured>"}
#                     A button runs its command (no leading slash) on click; a
#                     text element is a body line. Edit with /facility menu ...
#                     or the chest GUI editor (/facility menu edit).
#   music           - a sound played while a player sits in the main menu, and
#                     re-played every `interval-minutes`. `sound` is any sound
#                     key (a vanilla one, or a custom one you add to the resource
#                     pack, e.g. facility:menu_theme). Stops on PLAY / leaving.
menu:
  reentry-seconds: 10
  music:
    enabled: true
    sound: "minecraft:music_disc.chirp"
    interval-minutes: 3
    volume: 1.0
    pitch: 1.0
  elements:
    - {type: button, label: "&a&l▶ PLAY", action: "facility continue"}
    - {type: button, label: "&bSELECT TEAM", action: "facility teams"}

# Facility-wide BLACKOUT (/facility blackout on|off|toggle [seconds]).
# When engaged, every WAXED COPPER TRAPDOOR that is a light fixture (TOP half,
# facing WEST or EAST) is switched to powered=false, and every minecraft:light
# block within `light-radius` of such a fixture is removed - the site goes dark.
# Ending the blackout restores every trapdoor and light exactly. The scan only
# touches LOADED chunks and is spread over ticks so it never freezes the server.
#   world     - blank = every world; or a single world name to limit the scan
#   min-y/max-y - the height band to scan (keep it to the facility for speed)
#   light-radius - how far around each fixture to strip minecraft:light blocks
#   chunks-per-tick - scan speed (higher = faster cascade, more work per tick)
blackout:
  world: ""
  min-y: 0
  max-y: 128
  light-radius: 2
  chunks-per-tick: 4

# Teams. Joining a team ACTUALLY confers three things, applied through
# LuckPerms when the player picks it:
#   rank        - the LuckPerms group the player is put into (the group is
#                 auto-created, inherits `default`, and is kept in sync with the
#                 prefix + permissions below on every load / /facility reload).
#   prefix      - the chat prefix set on that group (supports & colour codes).
#   permissions - permission nodes granted to that group.
# Also:
#   type   - public = anyone may join; private = must be granted (/facility grant).
#   icon   - the Material shown in the team selector.
#   display- the coloured name shown on the icon.
#
# These are working EXAMPLES - edit them (or add your own with
# /facility team add <name> <public|private> <rank> [ICON] [prefix...]).
teams:
  classd:
    display: "&eClass-D"
    type: public
    rank: classd
    icon: ORANGE_WOOL
    prefix: "&e[D-Class] "
    permissions:
      - facility.team.classd
  guard:
    display: "&9Security"
    type: public
    rank: guard
    icon: IRON_CHESTPLATE
    prefix: "&9[Security] "
    permissions:
      - facility.team.guard
  scientist:
    display: "&fFoundation Staff"
    type: public
    rank: scientist
    icon: LEATHER_CHESTPLATE
    prefix: "&f[Staff] "
    permissions:
      - facility.team.scientist
  mtf:
    display: "&cMTF Epsilon-11"
    type: private
    rank: mtf
    icon: NETHERITE_HELMET
    prefix: "&c[MTF] "
    permissions:
      - facility.team.mtf

# Per-team grant list for PRIVATE teams. Managed at runtime by
# /facility grant|revoke - each entry is a player UUID. Do not hand-edit
# unless you know the UUIDs.
grants: {}
